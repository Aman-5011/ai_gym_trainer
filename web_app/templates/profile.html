{% extends "base.html" %}

{% block content %}
<div class="dashboard-header" style="margin-bottom: 30px;">
    <h1 style="font-size: 2.2rem; font-weight: 800;">Profile Settings</h1>
    <p style="color: var(--text-muted); margin-top: 5px;">Update your biometrics to refine your AI-generated diet and workout plans.</p>
</div>

<div class="card" style="max-width: 650px; margin: 0 auto; border-top: 4px solid var(--accent-blue);">
    <form action="/profile" method="POST" id="profile-form">
        
        <div style="margin-bottom: 30px;">
            <h4 style="font-size: 0.9rem; color: var(--accent-blue); margin-bottom: 20px; letter-spacing: 1px;">PERSONAL DETAILS</h4>
            
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ profile.full_name }}" placeholder="e.g. John Doe" required>
                <div id="name-error" class="error-text"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" value="{{ profile.age }}" required>
                    <div id="age-error" class="error-text"></div>
                </div>
                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" value="{{ profile.height }}" required>
                    <div id="height-error" class="error-text"></div>
                </div>
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" step="0.1" id="weight" name="weight" value="{{ profile.weight }}" required>
                    <div id="weight-error" class="error-text"></div>
                </div>
            </div>
        </div>

        <div style="margin-bottom: 30px; padding-top: 20px; border-top: 1px solid #334155;">
            <h4 style="font-size: 0.9rem; color: var(--accent-blue); margin-bottom: 20px; letter-spacing: 1px;">TRAINING FOCUS</h4>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label for="fitness_level">Fitness Level</label>
                    <select id="fitness_level" name="fitness_level" required>
                        <option value="beginner" {% if profile.fitness_level == 'beginner' %}selected{% endif %}>Beginner</option>
                        <option value="intermediate" {% if profile.fitness_level == 'intermediate' %}selected{% endif %}>Intermediate</option>
                        <option value="advanced" {% if profile.fitness_level == 'advanced' %}selected{% endif %}>Advanced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal">Primary Goal</label>
                    <select id="goal" name="goal" required>
                        <option value="fat_loss" {% if profile.goal == 'fat_loss' %}selected{% endif %}>Fat Loss</option>
                        <option value="muscle_gain" {% if profile.goal == 'muscle_gain' %}selected{% endif %}>Muscle Gain</option>
                        <option value="endurance" {% if profile.goal == 'endurance' %}selected{% endif %}>Endurance</option>
                        <option value="general_training" {% if profile.goal == 'general_training' %}selected{% endif %}>General Training</option>
                    </select>
                </div>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <button type="submit" id="complete-button" class="btn" style="width: 100%; padding: 16px; font-size: 1.1rem; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);">
                Save Changes
            </button>
        </div>
    </form>
</div>

<script src="{{ url_for('static', filename='profile.js') }}"></script>
{% endblock %}
