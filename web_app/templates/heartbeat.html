{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Heart Rate Monitor</h1>
    <p class="text-muted">Real-time biometric data from your ESP32 sensor.</p>
</div>

<div class="heartbeat-container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 40px; text-align: center; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.3s ease;">
        <div style="font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 20px;">
            <span id="heart-icon" style="color: #ff3e3e; display: inline-block;">❤️</span> Live Heart Rate
        </div>
        
        <div id="bpm-value" style="font-size: 7rem; font-weight: 800; color: #ffffff; line-height: 1; margin: 10px 0; transition: all 0.5s ease;">--</div>
        <div style="font-size: 1rem; color: #888; margin-bottom: 30px;">BPM</div>
        
        <div id="status-container" style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px;">
            <div id="connection-indicator" style="width: 12px; height: 12px; border-radius: 50%; background: #555;"></div>
            <span id="bpm-status" style="font-style: italic; font-size: 0.95rem; color: #aaa;">Connecting to ESP32...</span>
        </div>
    </div>
</div>

<style>
    .card:hover { transform: translateY(-5px); border-color: #444; }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }
    .heart-pulse { animation: pulse 0.8s infinite; }
</style>

<script>
    const espIp = "http://192.168.1.100";
    const bpmVal = document.getElementById('bpm-value');
    const bpmStatus = document.getElementById('bpm-status');
    const indicator = document.getElementById('connection-indicator');
    const heartIcon = document.getElementById('heart-icon');

    function updateUI(bpm, status, color, pulse) {
        bpmVal.innerText = bpm;
        bpmVal.style.color = color;
        bpmStatus.innerText = status;
        bpmStatus.style.color = color;
        indicator.style.background = color;
        if(pulse) heartIcon.classList.add('heart-pulse');
        else heartIcon.classList.remove('heart-pulse');
    }

    setInterval(() => {
        fetch(`${espIp}/data`)
            .then(response => response.json())
            .then(data => {
                const bpm = data.bpm;
                const status = data.status;

                if (status === "Reading...") {
                    updateUI(bpm, status, "#00ff88", true);
                } else if (status === "No finger detected") {
                    updateUI("0", status, "#ff9800", false);
                } else {
                    updateUI("--", status, "#ff9800", false);
                }
            })
            .catch(error => {
                updateUI("--", "Device Offline", "#ff3e3e", false);
            });
    }, 1000);
</script>
{% endblock %}
